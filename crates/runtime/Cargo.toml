# The sealed vintage (chromosomes/ensemble/calibration) the evaluator session loads read-only (QE-207).
# qe-vintage embeds the genome via the shared qe-signal crate, so this edge does NOT reach the training
# side (qe-wfo) — the QE-001 train/live decoupling invariant holds (genome eval is shared via qe-signal).
